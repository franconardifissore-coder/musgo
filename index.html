function scrollPageToTop() {
  const applyScrollTop = () => {
    window.scrollTo(0, 0);
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
  };
  applyScrollTop();
  window.requestAnimationFrame(() => {
    applyScrollTop();
  });
}

function navigateToView(view, options = {}) {
  const {
    trackMainView = MAIN_VIEWS.includes(view),
    resetScan = view === 'scan',
    scroll = true,
    renderView = true,
    closeMenu = true,
    updateHistory = ROUTABLE_VIEWS.includes(view),
    replaceHistory = false,
  } = options;

  if (closeMenu) {
    state.menuOpen = false;
  }
  if (resetScan) {
    resetIdentificationState();
  }

  state.currentView = view;

  if (trackMainView) {
    state.previousMainView = view;
  }

  if (updateHistory) {
    const targetPath = getPathForView(view);
    if (targetPath) {
      syncHistoryPath(targetPath, { replace: replaceHistory });
    }
  }

  if (renderView) {
    render();
  }

  if (scroll) {
    scrollPageToTop();
  }
}

function dismissSplash() {
  if (!state.splashVisible) return;
  state.splashVisible = false;
  try {
    window.sessionStorage.setItem('musgo:splash-seen', '1');
  } catch (error) {}
  render();
}

function initSplash() {
  let seen = false;
  try {
    seen = window.sessionStorage.getItem('musgo:splash-seen') === '1';
  } catch (error) {}

  if (seen) {
    state.splashVisible = false;
    return;
  }

  state.splashVisible = true;
  window.setTimeout(() => {
    dismissSplash();
  }, 1350);
}

function renderTopbar() {
  const topbar = document.querySelector('.mobile-topbar');
  const menuButton = document.getElementById('topbarMenuButton');
  const brand = document.getElementById('topbarBrand');
  const appFrame = document.querySelector('.app-frame');
  const appMain = document.getElementById('appMain');
  const isPublicExperience = shouldShowPublicExperience();
  const isAuthenticatedExperience = shouldShowAuthenticatedExperience();
  const showPublicLanding = shouldRenderLanding();
  const showPublicAuth = shouldRenderAuthScreen();
  const hasDesktopSidebar = shouldUseDesktopSidebarLayout();
  if (topbar) {
    topbar.style.display = shouldShowTopbar() ? 'flex' : 'none';
    topbar.classList.toggle('splash-mode', Boolean(state.splashVisible));
  }
  if (appFrame) {
    appFrame.classList.toggle('desktop-sidebar-layout', hasDesktopSidebar);
    appFrame.classList.toggle('public-experience', isPublicExperience);
    appFrame.classList.toggle('authenticated-experience', isAuthenticatedExperience);
  }
  if (appMain) {
    appMain.setAttribute('data-experience', getCurrentExperience());
    appMain.setAttribute('data-shell', isAuthenticatedExperience ? 'authenticated' : 'none');
  }
  if (brand) {
    const brandIsClickable = isPublicExperience;
    brand.style.cursor = brandIsClickable ? 'pointer' : 'default';
    brand.setAttribute('aria-disabled', brandIsClickable ? 'false' : 'true');
  }
  if (menuButton) {
    const isPublicHeader = isPublicExperience;
    menuButton.classList.toggle('public-cta', showPublicLanding);
    menuButton.classList.toggle('is-open', Boolean(state.menuOpen) && !hasDesktopSidebar && !isPublicHeader);
    menuButton.setAttribute('aria-expanded', hasDesktopSidebar ? 'true' : (state.menuOpen ? 'true' : 'false'));
    if (showPublicLanding) {
      menuButton.style.display = 'inline-flex';
      menuButton.classList.remove('is-open');
      menuButton.innerHTML = `
        <img class="topbar-public-icon" src="./resources/ingresar.svg" alt="">
        <span class="topbar-public-label">Ingresar</span>
      `;
      menuButton.setAttribute('aria-label', 'Ir a acceso');
    } else if (showPublicAuth) {
      menuButton.style.display = 'none';
      menuButton.classList.remove('public-cta');
      menuButton.innerHTML = `
        <span class="topbar-menu-lines">
          <span></span>
          <span></span>
          <span></span>
        </span>
      `;
    } else {
      menuButton.style.display = hasDesktopSidebar ? 'none' : 'inline-flex';
      menuButton.classList.remove('public-cta');
      menuButton.innerHTML = `
        <span class="topbar-menu-lines">
          <span></span>
          <span></span>
          <span></span>
        </span>
      `;
      menuButton.setAttribute('aria-label', hasDesktopSidebar ? 'Menú visible' : (state.menuOpen ? 'Cerrar menú' : 'Abrir menú'));
    }
  }
}

function handleTopbarAction() {
  if (shouldRenderLanding()) {
    navigateToView('auth');
    return;
  }
  if (shouldRenderAuthScreen()) return;
  toggleMenu();
}

function handleTopbarBrandClick() {
  if (shouldRenderLanding() || shouldRenderAuthScreen()) {
    navigateToView('landing');
  }
}

function handleTopbarBrandKeydown(event) {
  if (event.key === 'Enter' || event.key === ' ') {
    event.preventDefault();
    handleTopbarBrandClick();
  }
}

function renderMenu() {
  const overlay = document.getElementById('menuOverlay');
  if (!overlay) return;
  const isPublicExperience = shouldShowPublicExperience();
  const forceDesktopSidebar = shouldUseDesktopSidebarLayout();

  if (state.splashVisible || isPublicExperience) {
    overlay.classList.remove('open');
    overlay.innerHTML = '';
    return;
  }

  const items = [
    { id: 'dashboard', icon: './resources/Navbar/Home.svg', label: 'Inicio' },
    { id: 'plants', icon: './resources/Navbar/plants icon.svg', label: 'Plantas' },
    { id: 'scan', icon: './resources/Navbar/Scanner icon.svg', label: 'Escanner' },
    { id: 'spaces', icon: './resources/Navbar/Spaces icon.svg', label: 'Espacios' },
    { id: 'profile', icon: './resources/Navbar/Profile icon.svg', label: 'Perfil' },
  ];
  const activeView = isAuthenticatedMainView()
    ? state.currentView
    : getPreviousMainView();

  overlay.innerHTML = `
    <div class="menu-drawer">
      <div class="menu-list">
        ${items.map(item => `
          <button class="menu-item ${activeView === item.id ? 'active' : ''}" type="button" onclick="navigateFromMenu('${item.id}')">
            <span class="menu-item-icon"><img src="${item.icon}" alt="${item.label}"></span>
            <span class="menu-item-copy">
              <strong>${item.label}</strong>
            </span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
  overlay.classList.toggle('open', forceDesktopSidebar || Boolean(state.menuOpen));
}

function toggleMenu() {
  if (state.splashVisible) return;
  state.menuOpen = !state.menuOpen;
  renderMenu();
}

function closeMenu() {
  if (!state.menuOpen) return;
  state.menuOpen = false;
  renderMenu();
}

function handleMenuOverlayClick(event) {
  if (event.target.id === 'menuOverlay') {
    closeMenu();
  }
}

function navigateFromMenu(view) {
  closeMenu();
  navigateToView(view);
}

// ===== STORAGE =====
// Local persistence is not implemented — all data lives in Supabase.
// saveState is kept as a no-op because action modules call it after mutations;
// replacing it here avoids touching every action file.
function saveState() {
  return;
}

function getFilteredPlants() {
  if (state.activeSection === 'all') return state.plants;
  return state.plants.filter(p => p.section === state.activeSection);

function renderPlantDetailScreen() {

function renderProfileScreen() {
  const overviewScreens = window.musgoOverviewScreens;
  if (!overviewScreens) {

  }
  return overviewScreens.renderProfileScreen();
}

function renderCurrentView() {
  const appMain = document.getElementById('appMain');
  if (!appMain) return;
  if (state.splashVisible) {
    appMain.innerHTML = renderSplashScreen();
    return;
  }
  if (shouldShowPublicExperience()) {
    appMain.innerHTML = renderPublicExperience();
    return;
  }
  if (shouldShowAuthenticatedExperience()) {
    appMain.innerHTML = renderAuthenticatedExperience();
    return;
  }
  appMain.innerHTML = renderAuthenticatedExperience();
}

function renderPublicExperience() {
  const publicScreens = window.musgoPublicScreens;
  if (!publicScreens) {
    throw new Error('musgo_public_screens_unavailable');
  }
  if (shouldRenderAuthScreen()) {
    return publicScreens.renderAuthScreen();
  }
  return publicScreens.renderLandingScreen();
}

function renderAuthenticatedExperience() {
  const authenticatedRegistry = window.musgoAuthenticatedRegistry;
  if (!authenticatedRegistry) {
    throw new Error('musgo_authenticated_registry_unavailable');
  }
  return authenticatedRegistry.renderAuthenticatedExperience();
}

function renderAuthenticatedRouteContent() {
  const authenticatedRegistry = window.musgoAuthenticatedRegistry;
  if (!authenticatedRegistry) {
    throw new Error('musgo_authenticated_registry_unavailable');
  }
  return authenticatedRegistry.renderAuthenticatedRouteContent();
}

function render() {
  renderTopbar();
  renderCurrentView();
  renderMenu();
}

// ===== ACTIONS =====
window.navigateToView = navigateToView;

const sectionEmojis = ['🌺','🛋️','🛏️','🚿','🍳','🪴','🌿','🏡','🌞','💻','📚','🎭'];

async function confirmDelete() {
  const deletedPlant = await window.musgoPlantActions.confirmDeletePlant();
  if (deletedPlant) return;
  await window.musgoSpacesActions.confirmDeleteSection();
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) el.classList.remove('open');
  });
});

window.addEventListener('popstate', () => {
  applyRouteFromLocation({
    renderView: true,
    scroll: false,
    replaceHistory: false,
  });
  reconcileNavigationWithAuth();
});

// ===== TOAST =====
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== INIT =====
applyRouteFromLocation({
  renderView: false,
  scroll: false,
  replaceHistory: true,
});
initSplash();
render();
initAuth();
