<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Musgo</title>
<link rel="icon" type="image/png" href="./resources/newlogo small.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #345D4C;
    --green-light: #C6EBD4;
    --bg: #f4f7f1;
    --bg-soft: #eef4ec;
    --surface: rgba(255, 255, 255, 0.84);
    --surface-strong: #ffffff;
    --surface-muted: #f6faf4;
    --line: rgba(96, 125, 101, 0.14);
    --line-strong: rgba(83, 115, 88, 0.2);
    --accent: var(--green-dark);
    --accent-deep: var(--green-dark);
    --accent-soft: rgba(198, 235, 212, 0.5);
    --text: #1f3425;
    --text-soft: #526457;
    --muted: #708172;
    --muted-soft: #94a096;
    --rain: #6e9db3;
    --rain-soft: rgba(110, 157, 179, 0.12);
    --earth: #987d58;
    --earth-soft: rgba(152, 125, 88, 0.1);
    --danger: #cf7152;
    --danger-soft: rgba(207, 113, 82, 0.12);
    --shadow-xs: 0 10px 30px rgba(31, 52, 37, 0.05);
    --shadow-sm: 0 18px 44px rgba(31, 52, 37, 0.08);
    --shadow-md: 0 26px 70px rgba(31, 52, 37, 0.12);
    --radius-sm: 16px;
    --radius-md: 22px;
    --radius-lg: 30px;
    --radius-xl: 40px;
    --space-1: 6px;
    --space-2: 10px;
    --space-3: 14px;
    --space-4: 18px;
    --space-5: 24px;
    --space-6: 32px;
    --space-7: 44px;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    color: var(--text);
    background: #F9F9F8;
    overflow-x: hidden;
  }

  .app-shell {
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    padding: 0;
    background: #F9F9F8;
  }

  .app-frame {
    width: min(100%, 430px);
    min-height: 100dvh;
    height: auto;
    display: flex;
    flex-direction: column;
    border-radius: 0;
    background: #ffffff;
    border: none;
    box-shadow: none;
    overflow: visible;
    backdrop-filter: none;
  }

  .mobile-topbar {
    min-height: 72px;
    width: 100%;
    margin: 0;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    background: #ffffff;
    position: relative;
    z-index: 5;
    border: none;
    border-bottom: 1px solid rgba(25, 28, 28, 0.12);
    border-radius: 0;
    box-shadow: none;
  }

  .topbar-menu-button {
    width: 42px;
    height: 42px;
    border: none;
    border-radius: 0;
    background: transparent;
    box-shadow: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.18s ease;
  }

  .topbar-menu-button:hover {
    background: transparent;
    transform: none;
    box-shadow: none;
    opacity: 0.72;
  }

  .topbar-menu-button.is-open {
    background: transparent;
    box-shadow: none;
  }

  .topbar-menu-lines {
    width: 16px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .topbar-menu-lines span {
    width: 100%;
    height: 2px;
    border-radius: 999px;
    background: #345d4c;
    display: block;
    transition: background 0.18s ease;
  }

  .topbar-menu-button.is-open .topbar-menu-lines span {
    background: #ffffff;
  }

  .mobile-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }

  .mobile-brand-icon {
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .mobile-brand-icon img {
    width: 100%;
    height: 100%;
    display: block;
  }

  .mobile-brand-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 24px;
    font-weight: 600;
    color: #345d4c;
    letter-spacing: -0.03em;
  }

  .mobile-topbar.splash-mode {
    background: #ffffff;
  }

  .app-main {
    flex: 0 0 auto;
    overflow: visible;
    padding: 24px 28px 40px;
  }

  .screen {
    display: flex;
    flex-direction: column;
    gap: 24px;
    min-height: 100%;
    animation: screen-enter 0.24s ease;
  }

  @keyframes screen-enter {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .screen-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .screen-back {
    border: none;
    background: rgba(255, 255, 255, 0.88);
    color: #345d4c;
    border-radius: 999px;
    min-height: 40px;
    padding: 0 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 0.84rem;
    font-weight: 700;
    box-shadow: 0 10px 24px rgba(31, 52, 37, 0.06);
    border: 1px solid rgba(52, 93, 76, 0.12);
    cursor: pointer;
  }

  .screen-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 12px;
    border-radius: 999px;
    background: rgba(79, 168, 109, 0.1);
    color: #2e7d4f;
    font-size: 0.74rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    width: fit-content;
  }

  .screen-intro {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .screen-title {
    font-family: 'DM Sans', sans-serif;
    font-size: 2rem;
    line-height: 1.1;
    font-weight: 800;
    color: #191c1c;
    letter-spacing: -0.05em;
  }

  .landing-screen {
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .landing-hero {
    display: grid;
    gap: 22px;
    padding: 6px 0 4px;
  }

  .landing-copy {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .landing-eyebrow {
    font-size: 0.76rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(52, 93, 76, 0.68);
  }

  .landing-title {
    font-size: 3.2rem;
    line-height: 0.93;
    letter-spacing: -0.08em;
    color: #191c1c;
    font-weight: 800;
  }

  .landing-subtitle {
    max-width: 18ch;
    font-size: 1.06rem;
    line-height: 1.45;
    color: #4f5b52;
  }

  .landing-cta {
    width: fit-content;
    min-width: 164px;
  }

  .landing-mockup {
    position: relative;
    padding: 18px 14px;
    border-radius: 34px;
    background:
      radial-gradient(circle at 22% 18%, rgba(198, 235, 212, 0.82), transparent 42%),
      linear-gradient(180deg, #ffffff 0%, #f6faf5 100%);
    border: 1px solid rgba(52, 93, 76, 0.09);
    box-shadow: 0 28px 48px rgba(31, 52, 37, 0.08);
    overflow: hidden;
  }

  .landing-phone {
    position: relative;
    margin: 0 auto;
    width: min(100%, 292px);
    border-radius: 34px;
    border: 8px solid #141716;
    background: #ffffff;
    box-shadow: 0 16px 36px rgba(20, 23, 22, 0.18);
    overflow: hidden;
  }

  .landing-phone-notch {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 106px;
    height: 22px;
    border-radius: 999px;
    background: #101413;
    z-index: 2;
  }

  .landing-phone-screen {
    padding: 42px 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 420px;
    background: linear-gradient(180deg, #f8fbf7 0%, #ffffff 100%);
  }

  .landing-phone-card {
    border-radius: 24px;
    background: #ffffff;
    border: 1px solid rgba(52, 93, 76, 0.08);
    box-shadow: 0 16px 28px rgba(31, 52, 37, 0.05);
    padding: 18px;
  }

  .landing-phone-card.hero {
    min-height: 182px;
    display: flex;
    align-items: flex-end;
    background:
      radial-gradient(circle at 82% 18%, rgba(198, 235, 212, 0.72), transparent 28%),
      linear-gradient(180deg, #f3faf2 0%, #ffffff 100%);
  }

  .landing-phone-card.hero::before {
    content: '';
    position: absolute;
    inset: 0;
  }

  .landing-phone-metric {
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
    z-index: 1;
  }

  .landing-phone-metric-value {
    font-size: 2.4rem;
    line-height: 1;
    font-weight: 800;
    color: #345D4C;
    letter-spacing: -0.06em;
  }

  .landing-phone-metric-label {
    font-size: 0.9rem;
    color: #4f5b52;
    max-width: 14ch;
    line-height: 1.35;
  }

  .landing-phone-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .landing-mini-card {
    border-radius: 20px;
    background: #f7f8f6;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 122px;
  }

  .landing-mini-icon {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    background: rgba(198, 235, 212, 0.55);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #345D4C;
    font-size: 1.2rem;
  }

  .landing-mini-title {
    font-size: 0.9rem;
    font-weight: 700;
    color: #1f3425;
    line-height: 1.2;
  }

  .landing-mini-copy {
    font-size: 0.8rem;
    line-height: 1.4;
    color: #607064;
  }

  .landing-section {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .landing-section-head {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .landing-section-title {
    font-size: 1.38rem;
    font-weight: 800;
    color: #191c1c;
    letter-spacing: -0.04em;
  }

  .landing-section-copy {
    color: #5a685e;
    font-size: 0.96rem;
    line-height: 1.5;
  }

  .landing-feature-list {
    display: grid;
    gap: 12px;
  }

  .landing-feature {
    padding: 18px;
    border-radius: 24px;
    background: rgba(255, 255, 255, 0.88);
    border: 1px solid rgba(52, 93, 76, 0.08);
    box-shadow: 0 16px 26px rgba(31, 52, 37, 0.045);
    display: grid;
    grid-template-columns: 48px minmax(0, 1fr);
    gap: 14px;
    align-items: start;
  }

  .landing-feature-icon {
    width: 48px;
    height: 48px;
    border-radius: 16px;
    background: rgba(198, 235, 212, 0.48);
    color: #345D4C;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
  }

  .landing-feature-title {
    font-size: 1rem;
    font-weight: 700;
    color: #1f3425;
    margin-bottom: 4px;
  }

  .landing-feature-copy {
    font-size: 0.88rem;
    line-height: 1.45;
    color: #647267;
  }

  .landing-legal {
    display: flex;
    flex-wrap: wrap;
    gap: 14px 22px;
    align-items: center;
    justify-content: center;
    padding: 6px 0 4px;
  }

  .landing-legal a {
    color: #40493d;
    font-size: 0.92rem;
    line-height: 1.4;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  @media (min-width: 760px) {
    .app-shell {
      padding: 0 24px 32px;
    }

    .app-frame {
      width: min(100%, 1120px);
    }

    .mobile-topbar {
      padding: 24px 32px 18px;
    }

    .app-main {
      padding: 28px 32px 56px;
    }

    .screen {
      gap: 28px;
    }

    .screen-title {
      font-size: 2.5rem;
    }

    .screen-subtitle {
      max-width: 62ch;
      font-size: 1rem;
    }

    .chip-row {
      flex-wrap: wrap;
      overflow: visible;
      padding-bottom: 0;
    }

    .plants-grid-mobile {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
      justify-content: start;
    }

    .spaces-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 420px));
      gap: 22px;
      justify-content: start;
    }

    .dashboard-chart-card,
    .dashboard-summary-card,
    .profile-card,
    .space-card,
    .view-empty,
    .space-editor-card {
      border-radius: 28px;
    }

    .scan-panel {
      max-width: 560px;
    }

    .detail-calendar-wrap {
      max-width: 520px;
    }

    .menu-drawer {
      right: 32px;
      width: 280px;
    }
  }

  @media (min-width: 900px) {
    .landing-screen {
      gap: 36px;
    }

    .landing-hero {
      grid-template-columns: minmax(0, 1fr) minmax(320px, 380px);
      align-items: center;
      gap: 28px;
    }

    .landing-title {
      font-size: 4.2rem;
    }

    .landing-subtitle {
      max-width: 24ch;
    }

    .landing-feature-list {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
  }

  @media (min-width: 1100px) {
    .app-shell {
      justify-content: stretch;
      padding: 0;
    }

    .app-frame {
      width: 100%;
      max-width: none;
      min-height: 100dvh;
    }

    .app-frame.desktop-sidebar-layout {
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
      grid-template-rows: 82px minmax(0, 1fr);
      column-gap: 0;
      align-items: stretch;
    }

    .mobile-topbar {
      grid-column: 1 / -1;
      grid-row: 1;
      padding: 16px 32px;
    }

    .topbar-menu-button {
      display: none;
    }

    .app-main {
      padding: 28px 40px 72px;
    }

    .app-frame.desktop-sidebar-layout .app-main {
      grid-column: 2;
      grid-row: 2;
      padding: 32px 40px 72px;
    }

    .menu-overlay {
      display: none;
    }

    .app-frame.desktop-sidebar-layout .menu-overlay {
      position: relative;
      top: auto;
      inset: auto;
      grid-column: 1;
      grid-row: 2;
      display: block;
      opacity: 1;
      visibility: visible;
      background: #ffffff;
      backdrop-filter: none;
      z-index: 1;
      align-self: stretch;
      pointer-events: none;
      border-right: 1px solid rgba(25, 28, 28, 0.08);
    }

    .app-frame.desktop-sidebar-layout .menu-overlay:not(.open) {
      display: none;
    }

    .menu-drawer {
      width: min(240px, calc(100% - 36px));
      border-radius: 22px;
      box-shadow: 0 18px 44px rgba(31, 52, 37, 0.12);
    }

    .app-frame.desktop-sidebar-layout .menu-drawer {
      position: sticky;
      top: 0;
      right: 0;
      width: 100%;
      min-height: 100%;
      transform: none;
      border-radius: 0;
      border: none;
      box-shadow: none;
      background: #ffffff;
      pointer-events: auto;
    }

    .plants-grid-mobile {
      grid-template-columns: repeat(4, minmax(0, 1fr)) !important;
      gap: 18px !important;
    }

    .plant-tile {
      min-width: 0;
    }

    .plant-tile-visual {
      height: 170px;
    }

    .plant-tile-body {
      padding: 16px 14px 18px;
    }

    .plant-tile-name {
      font-size: 1rem;
    }

    .plant-tile-last {
      font-size: 0.88rem;
    }

    .plant-tile-water-button {
      min-height: 38px;
      font-size: 0.86rem;
    }

    .spaces-list {
      grid-template-columns: repeat(auto-fit, minmax(260px, 320px));
      gap: 24px;
      justify-content: start;
    }

    .dashboard-layout {
      display: grid;
      grid-template-columns: minmax(0, 360px) minmax(0, 1fr);
      gap: 24px;
      align-items: start;
    }

    .dashboard-chart-card {
      min-height: 100%;
      margin-top: 0;
    }

    .profile-card {
      max-width: 720px;
    }

    .scan-panel {
      max-width: 620px;
    }
  }

  @media (min-width: 1100px) {
    .profile-card,
    .profile-actions {
      max-width: 504px;
    }

    .plant-detail-layout {
      max-width: 380px;
    }

    .legal-links {
      max-width: 504px;
    }

    .auth-panel,
    .auth-legal-copy {
      max-width: 640px;
    }
  }

  .screen-subtitle {
    color: #40493d;
    font-size: 0.95rem;
    line-height: 1.45;
  }

  .chip-row {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }

  .chip-row::-webkit-scrollbar {
    display: none;
  }

  .filter-chip {
    border: none;
    border-radius: 999px;
    padding: 10px 24px;
    background: #edeeed;
    color: #40493d;
    font-size: 0.9rem;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
  }

  .filter-chip.active {
    background: #345d4c;
    color: #fff;
  }

  .plants-grid-mobile {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .plant-tile {
    background: #fff;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 14px 34px rgba(52, 93, 76, 0.07);
    display: flex;
    flex-direction: column;
    min-height: 252px;
    border: 1px solid rgba(52, 93, 76, 0.06);
  }

  .plant-tile-visual {
    height: 220px;
    position: relative;
    background:
      radial-gradient(circle at top center, rgba(79, 168, 109, 0.16), transparent 42%),
      linear-gradient(180deg, #f2f5f1 0%, #edf3eb 100%);
    overflow: hidden;
  }

  .plant-tile-visual img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .plant-tile-emoji {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
  }

  .plant-tile-body {
    padding: 20px 18px 22px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .plant-tile-name {
    font-size: 1.15rem;
    font-weight: 800;
    color: #191c1c;
    line-height: 1.08;
    letter-spacing: -0.03em;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    min-height: calc(1.08em * 2);
  }

  .plant-tile-last {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    color: #4b564d;
    font-size: 0.95rem;
    line-height: 1.35;
    min-height: calc(1.35em * 2);
  }

  .plant-tile-status-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    margin-top: 2px;
    display: block;
  }

  .plant-tile-water-button {
    margin-top: 6px;
    min-height: 42px;
    width: 100%;
    border: none;
    border-radius: 999px;
    background: #F3F4F3;
    color: #345D4C;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 0.92rem;
    font-weight: 700;
    cursor: pointer;
  }

  .plant-tile-water-button::before {
    content: '';
    width: 16px;
    height: 16px;
    background-image: url('./resources/green drop.svg');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    flex-shrink: 0;
  }

  .add-plant-card-mobile {
    min-height: 244px;
    border-radius: 24px;
    border: 2px dashed #bfcaba;
    background:
      radial-gradient(circle at top right, rgba(79, 168, 109, 0.12), transparent 30%),
      rgba(237, 238, 237, 0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    box-shadow: 0 14px 34px rgba(52, 93, 76, 0.05);
  }

  .add-plant-card-mobile .add-circle {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #345d4c;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
  }

  .add-plant-card-mobile .add-label {
    font-size: 0.92rem;
    font-weight: 700;
    color: #40493d;
  }

  .spaces-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .space-card {
    background: #fff;
    border-radius: 28px;
    padding: 24px;
    box-shadow: 0 14px 34px rgba(52, 93, 76, 0.07);
    display: flex;
    flex-direction: column;
    gap: 20px;
    border: 1px solid rgba(52, 93, 76, 0.06);
  }

  .space-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
  }

  .space-card-icon {
    width: 54px;

  .grid-full {

  .btn-danger {

const MAIN_VIEWS = ['dashboard', 'plants', 'scan', 'spaces', 'profile'];

function isUnauthenticatedExperience() {
  return state.auth.ready && state.auth.configured && !state.auth.user;
}

function shouldRenderLanding() {
  return isUnauthenticatedExperience() && state.currentView !== 'auth';
}

function shouldRenderAuthScreen() {
  return isUnauthenticatedExperience() && state.currentView === 'auth';
}

function daysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return formatLocalDate(d);
}

function today() {
  return formatLocalDate(new Date());
}

function formatLocalDate(date) {
  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, '0');
  const day = String(date.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function parseLocalDate(dateStr) {
  const [year, month, day] = String(dateStr).split('-').map(Number);
  return new Date(year, (month || 1) - 1, day || 1);
}

function daysBetween(dateStr) {
  const then = parseLocalDate(dateStr);
  const now = new Date();
  then.setHours(0,0,0,0);
  now.setHours(0,0,0,0);
  return Math.floor((now - then) / 86400000);
}

// Get last watered from log
function lastWatered(plant) {
  if (!plant.waterLog || plant.waterLog.length === 0) return null;
  return plant.waterLog.slice().sort().reverse()[0];
}

function resetTransientState() {
}

function confidenceToPercent(confidence) {
  const numericConfidence = Number(confidence || 0);
  return Math.round(numericConfidence <= 1 ? numericConfidence * 100 : numericConfidence);
}

function escapeHtml(value) {
  return String(value || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function resetIdentificationState() {
  state.identification = {
    file: null,
    preview: '',
    bestMatch: '',
    results: [],
    selectedIndex: null,
    loading: false,
    error: '',
    emptyMessage: '',
    remainingRequests: null,
  };
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error('file_read_failed'));
    reader.readAsDataURL(file);
  });
}

function loadImageElement(src) {
  return new Promise((resolve, reject) => {
    const image = new Image();
    image.onload = () => resolve(image);
    image.onerror = () => reject(new Error('image_load_failed'));
    image.src = src;
  });
}

async function createPersistableImagePreview(file) {
  const rawDataUrl = await fileToDataUrl(file);
  if (!rawDataUrl) return '';

  try {
    const image = await loadImageElement(rawDataUrl);
    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d');
    if (!context) return rawDataUrl;

    const MAX_DIMENSION = 1280;
    const MAX_PREVIEW_LENGTH = 900000;
    let width = image.naturalWidth || image.width;
    let height = image.naturalHeight || image.height;
    const scale = Math.min(1, MAX_DIMENSION / Math.max(width, height));
    width = Math.max(1, Math.round(width * scale));
    height = Math.max(1, Math.round(height * scale));
    canvas.width = width;
    canvas.height = height;
    context.drawImage(image, 0, 0, width, height);

    const qualities = [0.86, 0.78, 0.7, 0.62, 0.54];
    for (const quality of qualities) {
      const compressed = canvas.toDataURL('image/jpeg', quality);
      if (compressed.length <= MAX_PREVIEW_LENGTH) {
        return compressed;
      }
    }

    return canvas.toDataURL('image/jpeg', 0.46);
  } catch (error) {
    return rawDataUrl;
  }
}

function getPersistableImagePreview(dataUrl) {
  return dataUrl || '';
}

function createEntityId(prefix = 'id') {
  if (window.crypto && typeof window.crypto.randomUUID === 'function') {
    return window.crypto.randomUUID();
  }
  return `${prefix}-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function createPlantDraft(prefill = null, existingPlant = null) {
  if (existingPlant) {
    return {
      id: existingPlant.id,
      name: existingPlant.name || '',
      species: existingPlant.species || '',
      emoji: existingPlant.emoji || '🌿',
      section: existingPlant.section || '',
      freq: existingPlant.freq || 3,
      light: existingPlant.light || '⛅ Luz indirecta',
      imagePreview: existingPlant.imagePreview || '',
      identifiedSpecies: existingPlant.identifiedSpecies || '',
      identifiedCommonName: existingPlant.identifiedCommonName || '',
      identificationConfidence: existingPlant.identificationConfidence ?? null,
      identifiedAt: existingPlant.identifiedAt || null,
      waterLog: Array.isArray(existingPlant.waterLog) ? [...existingPlant.waterLog] : [],
    };
  }

  return {
    id: null,
    name: prefill?.name || '',
    species: prefill?.species || '',
    emoji: prefill?.emoji || '🌿',
    section: state.activeSection !== 'all' ? state.activeSection : '',
    freq: 3,
    light: '⛅ Luz indirecta',
    imagePreview: prefill?.imagePreview || '',
    identifiedSpecies: prefill?.identifiedSpecies || '',
    identifiedCommonName: prefill?.identifiedCommonName || '',
    identificationConfidence: prefill?.identificationConfidence ?? null,
    identifiedAt: prefill?.identifiedAt || null,
    waterLog: [],
  };
}

function createSectionDraft(existingSection = null) {
  return {
    id: existingSection?.id || null,
    name: existingSection?.name || '',
    icon: existingSection?.icon || '🪴',
    plantCount: existingSection ? state.plants.filter(plant => plant.section === existingSection.id).length : 0,
  };
}

function getPreviousMainView(fallback = 'plants') {
  return MAIN_VIEWS.includes(state.previousMainView) ? state.previousMainView : fallback;
}

function renderBackButton(label = 'Volver', targetView = null) {
  const destination = targetView || getPreviousMainView();
  return `<button class="screen-back" type="button" onclick="setView('${destination}')">← ${escapeHtml(label)}</button>`;
}

function renderSectionOptions(selectedSection = '', includePlaceholder = false) {
  const options = [];
  if (includePlaceholder) {
    options.push(`<option value="" ${selectedSection ? '' : 'selected'}>Sin asignar</option>`);
  } else {
    options.push(`<option value="" ${selectedSection ? '' : 'selected'}>Sin asignar</option>`);
  }
  options.push(...state.sections.map(section => (
    `<option value="${section.id}" ${selectedSection === section.id ? 'selected' : ''}>${escapeHtml(section.icon)} ${escapeHtml(section.name)}</option>`
  )));
  return options.join('');
}

function goBackToMainView(fallback = 'plants') {
  setView(getPreviousMainView(fallback));
}

function scrollPageToTop() {
  const applyScrollTop = () => {
    window.scrollTo(0, 0);
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
  };
  applyScrollTop();
  window.requestAnimationFrame(() => {
    applyScrollTop();
  });
}

function dismissSplash() {
  if (!state.splashVisible) return;
  state.splashVisible = false;
  try {
    window.sessionStorage.setItem('musgo:splash-seen', '1');
  } catch (error) {}
  render();
}

function initSplash() {
  let seen = false;
  try {
    seen = window.sessionStorage.getItem('musgo:splash-seen') === '1';
  } catch (error) {}

  if (seen) {
    state.splashVisible = false;
    return;
  }

  state.splashVisible = true;
  window.setTimeout(() => {
    dismissSplash();
  }, 1350);
}

function applyAuthState({ session = null, user = null, configured = state.auth.configured, error = '' } = {}) {
  const previousUserId = state.auth.user?.id || null;
  state.auth = {
    ...state.auth,
    ready: true,
    configured,
    session,
    user,
    error,
  };
  render();

  const nextUserId = user?.id || null;
  if (nextUserId && nextUserId !== previousUserId) {
    if (state.currentView === 'auth') {
      state.currentView = getPreviousMainView('dashboard');
    }
    loadCloudGarden();
  }
  if (!nextUserId && previousUserId) {
    if (state.currentView !== 'auth') {
      state.currentView = 'dashboard';
    }
    state.cloud = {
      loading: false,
      syncedUserId: null,
      error: '',
    };
    state.sections = [];
    state.plants = [];
    resetTransientState();
    render();
  }
}

async function initAuth() {
  const authApi = window.supabaseAuth;

  if (!authApi) {
    state.auth = {
      ...state.auth,
      ready: false,
      configured: false,
      session: null,
      user: null,
      error: '',
    };
    window.addEventListener('musgo:supabase-auth-ready', () => {
      initAuth();
    }, { once: true });
    return;
  }

  const configured = Boolean(authApi.isConfigured && authApi.isConfigured());
  applyAuthState({ configured, error: configured ? '' : 'Falta configurar SUPABASE_ANON_KEY en runtime.' });

  if (!configured) return;

  try {
    const { session, user } = await authApi.getSessionData();
    applyAuthState({ configured: true, session, user, error: '' });
  } catch (error) {
    applyAuthState({
      configured: true,
      session: null,
      user: null,
      error: error instanceof Error ? error.message : String(error),
    });
  }

  authApi.onAuthStateChange(({ session, user }) => {
    applyAuthState({ configured: true, session, user, error: '' });
  });
}

function getUserInitial(user) {
  const source = user?.user_metadata?.full_name || user?.email || '?';
  return source.trim().charAt(0).toUpperCase();
}

function getUserName(user) {
  return user?.user_metadata?.full_name || user?.user_metadata?.name || 'Sesión iniciada';
}

function isCloudSyncEnabled() {
  return Boolean(state.auth.user && window.supabaseData);
}

async function loadCloudGarden() {
  if (!isCloudSyncEnabled()) return;

  const userId = state.auth.user.id;
  state.cloud = {
    ...state.cloud,
    loading: true,
    error: '',
  };
  render();

  try {
    const garden = await window.supabaseData.fetchUserGarden();
    state.sections = garden.sections;
    state.plants = garden.plants;
    state.cloud = {
      loading: false,
      syncedUserId: userId,
      error: '',
    };
    render();
  } catch (error) {
    state.cloud = {
      loading: false,
      syncedUserId: null,
      error: error instanceof Error ? error.message : String(error),
    };
    render();
    showToast('⚠️ No pudimos cargar tus plantas desde la nube');
  }
}

async function syncSectionToCloud(section) {
  if (!isCloudSyncEnabled()) return;
  await window.supabaseData.upsertSection(section, state.auth.user.id);
}

async function syncPlantToCloud(plant) {
  if (!isCloudSyncEnabled()) return;
  const section = state.sections.find(item => item.id === plant.section);
  if (section) {
    await syncSectionToCloud(section);
  }
  await window.supabaseData.upsertPlant(plant, state.auth.user.id);
}

async function deletePlantFromCloud(plantId) {
  if (!isCloudSyncEnabled()) return;
  await window.supabaseData.deletePlant(plantId);
}

async function deleteSectionFromCloud(sectionId) {
  if (!isCloudSyncEnabled()) return;
  await window.supabaseData.clearPlantSection(sectionId);
  await window.supabaseData.deleteSection(sectionId);
}

function renderTopbar() {
  const topbar = document.querySelector('.mobile-topbar');
  const menuButton = document.getElementById('topbarMenuButton');
  const brand = document.getElementById('topbarBrand');
  const appFrame = document.querySelector('.app-frame');
  const isMainView = MAIN_VIEWS.includes(state.currentView);
  const showPublicLanding = shouldRenderLanding();
  const showPublicAuth = shouldRenderAuthScreen();
  const hasDesktopSidebar = window.innerWidth >= 1100 && isMainView && !state.splashVisible && !showPublicLanding && !showPublicAuth;
  if (topbar) {
    topbar.style.display = (state.splashVisible || isMainView || showPublicLanding || showPublicAuth) ? 'flex' : 'none';
    topbar.classList.toggle('splash-mode', Boolean(state.splashVisible));
  }
  if (appFrame) {
    appFrame.classList.toggle('desktop-sidebar-layout', hasDesktopSidebar);
  }
  if (brand) {
    const brandIsClickable = showPublicLanding || showPublicAuth;
    brand.style.cursor = brandIsClickable ? 'pointer' : 'default';
    brand.setAttribute('aria-disabled', brandIsClickable ? 'false' : 'true');
  }
  if (menuButton) {
    const isPublicHeader = showPublicLanding || showPublicAuth;
    menuButton.classList.toggle('is-open', Boolean(state.menuOpen) && !hasDesktopSidebar && !isPublicHeader);
    menuButton.setAttribute('aria-expanded', hasDesktopSidebar ? 'true' : (state.menuOpen ? 'true' : 'false'));
    if (showPublicLanding) {
      menuButton.style.display = 'inline-flex';
      menuButton.classList.remove('is-open');
      menuButton.innerHTML = '<span style="font-size:16px;font-weight:700;color:#345d4c;line-height:1;">Ingresar</span>';
      menuButton.setAttribute('aria-label', 'Ir a acceso');
    } else if (showPublicAuth) {
      menuButton.style.display = 'none';
      menuButton.innerHTML = `
        <span class="topbar-menu-lines">
          <span></span>
          <span></span>
          <span></span>
        </span>
      `;
    } else {
      menuButton.style.display = hasDesktopSidebar ? 'none' : 'inline-flex';
      menuButton.innerHTML = `
        <span class="topbar-menu-lines">
          <span></span>
          <span></span>
          <span></span>
        </span>
      `;
      menuButton.setAttribute('aria-label', hasDesktopSidebar ? 'Menú visible' : (state.menuOpen ? 'Cerrar menú' : 'Abrir menú'));
    }
  }
}

function handleTopbarAction() {
  if (shouldRenderLanding()) {
    setView('auth');
    return;
  }
  if (shouldRenderAuthScreen()) return;
  toggleMenu();
}

function handleTopbarBrandClick() {
  if (shouldRenderLanding() || shouldRenderAuthScreen()) {
    setView('dashboard');
  }
}

function handleTopbarBrandKeydown(event) {
  if (event.key === 'Enter' || event.key === ' ') {
    event.preventDefault();
    handleTopbarBrandClick();
  }
}

function renderMenu() {
  const overlay = document.getElementById('menuOverlay');
  if (!overlay) return;
  const isMainView = MAIN_VIEWS.includes(state.currentView);
  const showPublicLanding = shouldRenderLanding();
  const showPublicAuth = shouldRenderAuthScreen();
  const forceDesktopSidebar = window.innerWidth >= 1100 && isMainView && !state.splashVisible && !showPublicLanding && !showPublicAuth;

  if (state.splashVisible || showPublicLanding || showPublicAuth) {
    overlay.classList.remove('open');
    overlay.innerHTML = '';
    return;
  }

  const items = [
    { id: 'dashboard', icon: './resources/Navbar/Home.svg', label: 'Inicio' },
    { id: 'plants', icon: './resources/Navbar/plants icon.svg', label: 'Plantas' },
    { id: 'scan', icon: './resources/Navbar/Scanner icon.svg', label: 'Escanner' },
    { id: 'spaces', icon: './resources/Navbar/Spaces icon.svg', label: 'Espacios' },
    { id: 'profile', icon: './resources/Navbar/Profile icon.svg', label: 'Perfil' },
  ];
  const activeView = MAIN_VIEWS.includes(state.currentView)
    ? state.currentView
    : getPreviousMainView();

  overlay.innerHTML = `
    <div class="menu-drawer">
      <div class="menu-list">
        ${items.map(item => `
          <button class="menu-item ${activeView === item.id ? 'active' : ''}" type="button" onclick="navigateFromMenu('${item.id}')">
            <span class="menu-item-icon"><img src="${item.icon}" alt="${item.label}"></span>
            <span class="menu-item-copy">
              <strong>${item.label}</strong>
            </span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
  overlay.classList.toggle('open', forceDesktopSidebar || Boolean(state.menuOpen));
}

function toggleMenu() {
  if (state.splashVisible) return;
  state.menuOpen = !state.menuOpen;
  renderMenu();
}

function closeMenu() {
  if (!state.menuOpen) return;
  state.menuOpen = false;
  renderMenu();
}

function handleMenuOverlayClick(event) {
  if (event.target.id === 'menuOverlay') {
    closeMenu();
  }
}

function navigateFromMenu(view) {
  closeMenu();
  setView(view);
}

async function handleGoogleSignIn() {
  const authApi = window.supabaseAuth;
  if (!authApi || !authApi.isConfigured || !authApi.isConfigured()) {
    showToast('⚠️ Supabase Auth no está configurado');
    return;
  }

  try {
    await authApi.signInWithGoogle();
  } catch (error) {
    showToast('⚠️ No pudimos iniciar sesión con Google');
  }
}

function setAuthFormMode(mode) {
  state.authForm.mode = mode === 'signup' ? 'signup' : 'signin';
  state.authForm.error = '';
  state.authForm.success = '';
  render();
}

function updateAuthFormField(field, value) {
  if (!state.authForm) return;
  state.authForm[field] = value;
}

async function submitEmailAuth() {
  const authApi = window.supabaseAuth;
  if (!authApi || !authApi.isConfigured || !authApi.isConfigured()) {
    showToast('⚠️ Supabase Auth no está configurado');
    return;
  }

  const email = (state.authForm.email || '').trim();
  const password = state.authForm.password || '';

  if (!email) {
    state.authForm.error = 'Escribe tu email.';
    state.authForm.success = '';
    render();
    return;
  }

  if (password.length < 6) {
    state.authForm.error = 'La contraseña debe tener al menos 6 caracteres.';
    state.authForm.success = '';
    render();
    return;
  }

  state.authForm.loading = true;
  state.authForm.error = '';
  state.authForm.success = '';
  render();

  try {
    if (state.authForm.mode === 'signup') {
      await authApi.signUpWithEmail({ email, password });
      state.authForm.success = 'Cuenta creada. Ya puedes usar Musgo con tu email.';
      showToast('🌱 Cuenta creada');
    } else {
      await authApi.signInWithEmail({ email, password });
      state.authForm.success = '';
      showToast('👋 Sesión iniciada');
    }
    state.authForm.password = '';
  } catch (error) {
    state.authForm.error = error instanceof Error ? error.message : 'No pudimos completar la operación.';
  } finally {
    state.authForm.loading = false;
    render();
  }
}

async function handleSignOut() {
  const authApi = window.supabaseAuth;
  if (!authApi || !authApi.isConfigured || !authApi.isConfigured()) {
    showToast('⚠️ Supabase Auth no está configurado');
    return;
  }

  try {
    await authApi.signOut();
    showToast('👋 Sesión cerrada');
  } catch (error) {
    showToast('⚠️ No pudimos cerrar la sesión');
  }
}

// ===== STORAGE =====
function saveState() {
  return;
}

function loadState() {
  state.sections = [];
  state.plants = [];
  resetTransientState();
}

// ===== RENDER =====
function getFilteredPlants() {
  if (state.activeSection === 'all') return state.plants;
  return state.plants.filter(p => p.section === state.activeSection);
}

function needsWater(plant) {
  const lw = lastWatered(plant);
  if (!lw) return true;
  const days = daysBetween(lw);
  return days >= plant.freq;
}

function wateredToday(plant) {
  return (plant.waterLog || []).includes(today());
}

function renderPlantVisual(plant) {
  if (plant.imagePreview) {
    return `<img class="plant-photo" src="${plant.imagePreview}" alt="${escapeHtml(plant.name || plant.species || 'Planta')}">`;
  }
  return escapeHtml(plant.emoji || '🪴');
}

function renderCardState({ icon = '🪴', title = 'Tu jardín está listo', message = '', actionLabel = '', action = '', secondaryLabel = '', secondaryAction = '' } = {}) {
  return `
    <div class="view-empty">
      <div class="view-empty-icon">${escapeHtml(icon)}</div>
      <div class="view-empty-title">${escapeHtml(title)}</div>
      <div class="view-empty-copy">${escapeHtml(message)}</div>
      ${(actionLabel || secondaryLabel) ? `
        <div class="empty-state-actions" style="margin-top:18px;">
          ${actionLabel ? `<button class="btn-primary" onclick="${action}">${escapeHtml(actionLabel)}</button>` : ''}
          ${secondaryLabel ? `<button class="btn-secondary" onclick="${secondaryAction}">${escapeHtml(secondaryLabel)}</button>` : ''}
        </div>
      ` : ''}
    </div>
  `;
}

function renderAuthPrompt(message = 'Inicia sesión para ver y editar tu jardín.') {
  return renderCardState({
    icon: '☁️',
    title: 'Tu jardín está en la nube',
    message,
    actionLabel: 'Acceder',

function renderLoadingCard(message = 'Estamos recuperando tus plantas y secciones.') {
  return `
    <div class="inline-loading">
      <div class="splash-spinner" aria-hidden="true"></div>
      <div class="splash-note">Fotosíntesis en progreso…</div>
    </div>
  `;

function renderLandingScreen() {
  return `
    <section class="screen landing-screen">
      <div class="landing-hero">

function getPlantWaterStatus(plant) {
  const last = lastWatered(plant);
  if (!last) {
    return {
      text: 'Sin riegos registrados',
      icon: './resources/Riegos/Riego unkown.svg',
    };
  }

  const daysSinceLastWater = daysBetween(last);
  if (daysSinceLastWater > Number(plant.freq || 3)) {
    return {
      text: `${daysSinceLastWater} día${daysSinceLastWater === 1 ? '' : 's'} de atraso`,
      icon: './resources/Riegos/Riego empty.svg',
    };
  }

  const daysUntilNext = Number(plant.freq || 3) - daysSinceLastWater;
  if (daysUntilNext <= 0) {
    return {
      text: 'Regar hoy',
      icon: './resources/Riegos/Riego partial.svg',
    };
  }

  if (daysUntilNext === 1) {
    return {
      text: 'Regar mañana',
      icon: './resources/Riegos/Riego partial.svg',
    };
  }

  return {
    text: `Regar en ${daysUntilNext} días`,
    icon: './resources/Riegos/Riego full.svg',
  };
}

function addDaysToDate(date, days) {
  const next = new Date(date);
  next.setDate(next.getDate() + days);
  return next;
}

function countPlantsNeedingWaterOnDate(dateStr) {
  const targetDate = parseLocalDate(dateStr);
  return state.plants.filter(plant => {
    const lw = lastWatered(plant);
    if (!lw) return true;
    const lastDate = parseLocalDate(lw);
    const diffDays = Math.floor((targetDate - lastDate) / 86400000);
    return diffDays >= Number(plant.freq || 3);
  }).length;
}

function getDashboardWaterProjection(daysCount = 5) {
  const baseDate = parseLocalDate(today());
  const totalPlants = state.plants.length;
  return Array.from({ length: daysCount }, (_, index) => {
    const date = addDaysToDate(baseDate, index);
    const dateStr = formatLocalDate(date);
    const thirsty = countPlantsNeedingWaterOnDate(dateStr);
    return {
      dateStr,
      label: index === 0 ? 'Hoy' : `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}`,
      watered: Math.max(totalPlants - thirsty, 0),
      thirsty,
      total: totalPlants,
    };
  });
}

function renderPlantTiles(plants = []) {
  return plants.map(plant => {
    const status = getPlantWaterStatus(plant);
    return `

// ===== CALENDAR =====
const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function getCalendarMonthData(plant, year, month) {
  const todayStr = today();
  const todayDate = parseLocalDate(todayStr);
  const wateredSet = new Set((plant.waterLog || []).filter(d => {
    const dt = parseLocalDate(d);
    return dt.getFullYear() === year && dt.getMonth() === month;
  }).map(d => parseLocalDate(d).getDate()));

  const firstDay = new Date(year, month, 1);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const lw = lastWatered(plant);
  const projectedWaterDays = new Set();
  if (lw) {
    let cursor = parseLocalDate(lw);
    cursor.setHours(0,0,0,0);
    const monthEnd = new Date(year, month + 1, 0);
    monthEnd.setHours(23,59,59,999);
    while (cursor <= monthEnd) {
      cursor.setDate(cursor.getDate() + plant.freq);
      const isFutureOccurrence = cursor > todayDate;
      if (isFutureOccurrence && cursor.getFullYear() === year && cursor.getMonth() === month) {
        projectedWaterDays.add(cursor.getDate());
      }
    }
  }

  const cells = [];
  for (let i = 0; i < startDow; i++) {
    cells.push({ empty: true });
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const cellDate = new Date(year, month, d);
    const cellStr = formatLocalDate(cellDate);
    const isToday = cellStr === todayStr;
    const isWatered = wateredSet.has(d);
    const isProjected = projectedWaterDays.has(d);
    const isPastOrToday = cellDate <= todayDate;
    cells.push({
      day: d,
      dateStr: cellStr,
      isToday,
      isWatered,
      isProjected,
      canToggle: isPastOrToday,
    });
  }

  return { cells };
}

function renderCalendarCells(cells, clickHandlerName) {
  return cells.map(cell => {
    if (cell.empty) return `<div class="cal-day empty"></div>`;
    const classes = ['cal-day'];
    if (cell.isToday) classes.push('today');
    if (cell.isWatered) classes.push('watered');
    if (!cell.isWatered && cell.isProjected) classes.push('future-water');
    if (cell.canToggle) classes.push('clickable-past');
    return `
      <div class="${classes.join(' ')}" onclick="${clickHandlerName}('${cell.dateStr}', ${cell.isWatered})">
        <div class="cal-day-num">${cell.day}</div>
      </div>
    `;
  }).join('');
}

function renderInlinePlantCalendar(plant) {
  const { cells } = getCalendarMonthData(plant, state.calYear, state.calMonth);
  return `
    <div class="detail-calendar-card">
      <div class="detail-calendar-head">
        <div class="detail-calendar-month">${MONTH_NAMES[state.calMonth]} ${state.calYear}</div>
        <div class="detail-calendar-nav">
          <button type="button" onclick="calPrevMonth()">‹</button>
          <button type="button" onclick="calNextMonth()">›</button>
        </div>
      </div>
      <div class="detail-calendar-grid">
        <div class="cal-weekdays">
          <div class="cal-weekday">L</div>
          <div class="cal-weekday">M</div>
          <div class="cal-weekday">X</div>
          <div class="cal-weekday">J</div>
        <div class="cal-weekday">V</div>

function calPrevMonth() {
  state.calMonth--;
  if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
  if (state.currentView === 'plantDetail') {
    render();
    return;
  }
  renderCalendar();
}

function calNextMonth() {
  state.calMonth++;
  if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
  if (state.currentView === 'plantDetail') {
    render();
    return;
  }
  renderCalendar();
}

function renderCalendar() {
  const plant = state.plants.find(p => p.id === state.calPlantId);
  if (!plant) return;

  // Plant info header
  document.getElementById('calPlantInfo').innerHTML = `
    <div class="cal-plant-emoji">${plant.emoji}</div>
    <div>
      <div class="cal-plant-name">${plant.name}</div>
      <div class="cal-plant-species">${plant.species || ''}</div>
    </div>
  `;

  // Month label
  document.getElementById('calMonthLabel').textContent = `${MONTH_NAMES[state.calMonth]} ${state.calYear}`;

  const { cells } = getCalendarMonthData(plant, state.calYear, state.calMonth);
  const wateredCount = cells.filter(cell => cell.isWatered).length;
  const futureCount = cells.filter(cell => !cell.isWatered && cell.isProjected).length;
  const todayCount = cells.filter(cell => cell.isToday).length;

  document.getElementById('calDays').innerHTML = renderCalendarCells(cells, 'calDayClick');

  document.getElementById('calSummary').innerHTML = `
    <div class="cal-sum-item">
      <div class="cs-value watered">${wateredCount}</div>
      <div class="cs-label">Riegos</div>
    </div>
    <div class="cal-sum-item">
      <div class="cs-value">${todayCount}</div>
      <div class="cs-label">Hoy</div>
    </div>
    <div class="cal-sum-item">
      <div class="cs-value">${futureCount}</div>
      <div class="cs-label">Próximos</div>
    </div>
    <div class="cal-sum-item">
      <div class="cs-value">${cells.filter(cell => !cell.empty).length}</div>
      <div class="cs-label">Días del mes</div>
    </div>
  `;
}

async function calDayClick(dateStr, alreadyWatered) {
  const plant = state.plants.find(p => p.id === state.calPlantId);
  if (!plant) return;
  const clickDate = parseLocalDate(dateStr);
  const todayDate = parseLocalDate(today());
  if (clickDate > todayDate) return; // no future logging

  if (!plant.waterLog) plant.waterLog = [];
  const existingIndex = plant.waterLog.indexOf(dateStr);

  if (existingIndex >= 0) {
    plant.waterLog.splice(existingIndex, 1);
  } else {
    plant.waterLog.push(dateStr);
    plant.waterLog.sort();
  }

  saveState();
  render();
  renderCalendar();

  try {
    await syncPlantToCloud(plant);
  } catch (error) {
    showToast(existingIndex >= 0
      ? '⚠️ Quitamos el riego localmente, pero no pudimos sincronizarlo'
      : '⚠️ El riego se guardó localmente, pero no pudimos sincronizarlo');
    return;
  }

  const d = parseLocalDate(dateStr);
  const label = dateStr === today() ? 'hoy' : `el ${d.getDate()}/${d.getMonth()+1}`;
  showToast(existingIndex >= 0 ? `↩️ Riego quitado ${label}` : `💧 Riego añadido ${label}`);
}

async function detailCalendarDayClick(dateStr, alreadyWatered) {
  state.calPlantId = state.detailPlantId;
  await calDayClick(dateStr, alreadyWatered);
}

async function waterPlant(id) {
  const p = state.plants.find(x => x.id === id);
  if (!p) return;
  if (!p.waterLog) p.waterLog = [];
  const td = today();
  if (!p.waterLog.includes(td)) {
    p.waterLog.push(td);
  }
  saveState();
  render();
  try {
    await syncPlantToCloud(p);
  } catch (error) {
    console.error('Failed to sync watered plant', error);
    showToast('⚠️ Regamos localmente, pero no pudimos sincronizar en la nube');
    return;
  }
  showToast(`💧 ${p.name} regada`);
}

async function savePlantDetail() {
  const plant = state.plants.find(item => item.id === state.detailPlantId);
  const draft = state.detailDraft;
  if (!plant || !draft) return;

  plant.name = (draft.name || '').trim() || plant.species || 'Planta sin nombre';
  plant.freq = Number(draft.freq) || 3;
  plant.section = draft.section;
  saveState();
  render();

  try {
    await syncPlantToCloud(plant);
  } catch (error) {
    console.error('Failed to sync plant detail', error);
    showToast('⚠️ Guardamos localmente, pero no pudimos sincronizar la ficha');
    return;
  }

  showToast('🌱 Cambios guardados');
}

async function waterSection(sectionId) {
  const section = state.sections.find(item => item.id === sectionId);
  if (!section) return;

  const plantsInSection = state.plants.filter(plant => plant.section === sectionId);
  if (!plantsInSection.length) {
    showToast('⚠️ Esta sección no tiene plantas todavía');
    return;
  }

  const td = today();
  const updatedPlants = [];
  plantsInSection.forEach(plant => {
    if (!plant.waterLog) plant.waterLog = [];
    if (!plant.waterLog.includes(td)) {
      plant.waterLog.push(td);
      updatedPlants.push(plant);
    }
  });

  render();

  try {
    for (const plant of updatedPlants) {
      await syncPlantToCloud(plant);
    }
  } catch (error) {
    console.error('Failed to sync section watering', error);
    showToast('⚠️ Regamos localmente, pero no pudimos sincronizar toda la sección');
    return;
  }

  showToast(`💧 ${section.name} al día`);
}

async function savePlantFromScreen() {
  const draft = state.screenPlantDraft || createPlantDraft();
  const isIdentifiedFlow = state.screenPlantMode !== 'edit' && Boolean(draft.identifiedSpecies);
  const isManualCreateFlow = state.screenPlantMode !== 'edit' && !Boolean(draft.identifiedSpecies);

  const resolvedName = (draft.name || '').trim() || (draft.species || '').trim() || 'Planta sin nombre';
  let plantToSync;

  if (state.screenPlantMode === 'edit' && draft.id) {
    const existing = state.plants.find(item => item.id === draft.id);
    if (!existing) return;
    existing.name = resolvedName;
    existing.species = (draft.species || '').trim();
    existing.emoji = draft.emoji || '🌿';
    existing.section = draft.section;
    existing.freq = Number(draft.freq) || 3;
    existing.light = draft.light || '⛅ Luz indirecta';
    plantToSync = existing;
  } else {
    plantToSync = {
      ...(draft || {}),
      id: createEntityId('plant'),
      name: resolvedName,
      species: isManualCreateFlow ? '' : (draft.species || '').trim(),
      emoji: isManualCreateFlow ? '🪴' : (draft.emoji || '🌿'),
      section: draft.section,
      freq: Number(draft.freq) || 3,
      light: draft.light || '⛅ Luz indirecta',
      waterLog: Array.isArray(draft.waterLog) ? draft.waterLog : [],
    };
    state.plants.push(plantToSync);
  }

  state.detailPlantId = (isIdentifiedFlow || isManualCreateFlow) ? null : plantToSync.id;
  state.detailDraft = null;
  state.screenPlantDraft = null;
  state.editingPlantId = null;
  if (isIdentifiedFlow) {
    resetIdentificationState();
  }
  state.currentView = (isIdentifiedFlow || isManualCreateFlow) ? 'plants' : 'plantDetail';
  render();
  scrollPageToTop();

  try {
    await syncPlantToCloud(plantToSync);
  } catch (error) {
    console.error('Failed to sync plant from screen', error);
    showToast('⚠️ La planta se guardó localmente, pero no pudimos sincronizarla');
    return;
  }

  showToast(`🌱 ${resolvedName} guardada`);
}

// ===== EMOJIS =====
const plantEmojis = ['🌿','🌱','🌵','🌴','🌳','🌲','🍀','🍃','🌾','🌺','🌸','🌼','🌻','🌹','🌷','💐','🍁','🎋','🎍','🪴','🌿','🌾','🍂','🪻','💜','🍄'];
const sectionEmojis = ['🌺','🛋️','🛏️','🚿','🍳','🪴','🌿','🏡','🌞','💻','📚','🎭'];

function buildIdentifiedPlantDraft(result) {
  if (!result) return null;
  return {
    species: result.scientificName,
    name: result.scientificName || '',
    imagePreview: getPersistableImagePreview(state.identification.preview),
    identifiedSpecies: result.scientificName,
    identifiedCommonName: result.commonNames && result.commonNames.length ? result.commonNames[0] : '',
    identificationConfidence: result.confidence / 100,
    identifiedAt: new Date().toISOString(),
  };
}

function openIdentifiedPlantDraft(result) {
  const draft = buildIdentifiedPlantDraft(result);
  if (!draft) return;
  openPlantCreateView(draft);
}

function openDirectScanPicker() {
  if (state.identification.loading) return;
  resetIdentificationState();
  render();
  const input = document.getElementById('scanImageInput');
  if (!input) return;
  input.value = '';
  input.click();
}

async function handleDirectScanFileChange(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;

  state.identification.file = file;
  state.identification.bestMatch = '';
  state.identification.results = [];
  state.identification.selectedIndex = null;
  state.identification.error = '';
  state.identification.emptyMessage = '';
  state.identification.remainingRequests = null;

  try {
    state.identification.preview = await createPersistableImagePreview(file);
  } catch (error) {
    state.identification.preview = '';
    showToast('⚠️ No pudimos preparar la imagen. Prueba con otra foto.');
    render();
    return;
  }

  if (!window.plantIdentificationClient || typeof window.plantIdentificationClient.identifyPlantFromImage !== 'function') {
    showToast('⚠️ La integración de identificación no está disponible en este momento.');
    render();
    return;
  }

  state.identification.loading = true;
  render();

  try {
    const response = await window.plantIdentificationClient.identifyPlantFromImage(file);
    const usefulResults = response.results.filter(result => result.confidence >= 15);
    state.identification.bestMatch = response.bestMatch || '';
    state.identification.remainingRequests = response.remainingIdentificationRequests;
    state.identification.results = usefulResults;

    if (!usefulResults.length) {
      state.identification.emptyMessage = 'No pudimos identificarla con suficiente confianza. Puedes volver a intentarlo o crear la planta manualmente.';
      showToast('⚠️ No pudimos identificar la planta con suficiente confianza');
      render();
      return;
    }

    openIdentifiedPlantDraft(usefulResults[0]);
  } catch (error) {
    state.identification.error = 'No pudimos analizar la foto. Revisa tu conexión o vuelve a intentarlo.';
    showToast('⚠️ No pudimos analizar la foto');
    render();
  } finally {
    state.identification.loading = false;
    render();
  }
}


function openDeleteModal(id) {
  state.deletingSectionId = null;
  state.deletingPlantId = id;
  const p = state.plants.find(x => x.id === id);
  document.getElementById('deleteModalTitle').textContent = 'Eliminar planta';
  document.getElementById('deleteModalSubtitle').textContent = '¿Estás segur@ que deseas eliminar esta planta?';
  document.getElementById('deleteConfirmName').textContent = p ? `${p.name}` : '';
  document.getElementById('deleteModal').classList.add('open');
}

function openDeleteSectionModal(sectionId) {
  state.deletingPlantId = null;
  state.deletingSectionId = sectionId;
  const section = state.sections.find(x => x.id === sectionId);
  document.getElementById('deleteModalTitle').textContent = 'Eliminar espacio';
  document.getElementById('deleteModalSubtitle').textContent = '¿Estás segur@ que deseas eliminar este espacio?';
  document.getElementById('deleteConfirmName').textContent = section ? `${section.name}` : '';
  document.getElementById('deleteModal').classList.add('open');
}

function closeDeleteModal() {
  state.deletingPlantId = null;
  state.deletingSectionId = null;
  document.getElementById('deleteModal').classList.remove('open');
}

async function confirmDelete() {
  if (state.deletingSectionId) {
    await deleteCurrentSection();
    closeDeleteModal();
    return;
  }
  if (!state.deletingPlantId) return;
  const p = state.plants.find(x => x.id === state.deletingPlantId);
  const plantId = state.deletingPlantId;
  state.plants = state.plants.filter(x => x.id !== state.deletingPlantId);
  if (state.detailPlantId === plantId) {
    state.detailPlantId = null;
    state.detailDraft = null;
    state.currentView = 'plants';
  }
  saveState();
  closeDeleteModal();
  render();
  try {
    await deletePlantFromCloud(plantId);
  } catch (error) {
    console.error('Failed to delete plant in cloud', error);
    showToast('⚠️ Se eliminó localmente, pero no pudimos sincronizar el borrado');
    return;
  }
  if (p) showToast(`🗑️ ${p.name} eliminada`);
}

function editSectionFromSpaces(sectionId) {
  state.activeSection = sectionId;
  openEditSectionView(sectionId);
}

async function saveSectionChanges() {
  const sectionId = state.editingSectionId || state.activeSection;
  const section = state.sections.find(item => item.id === sectionId);
  if (!section) return;

  const nextName = ((state.screenSectionDraft?.name) || '').trim();
  if (!nextName) {
    showToast('⚠️ El nombre es obligatorio');
    return;
  }

  section.name = nextName;
  section.icon = state.screenSectionDraft?.icon || section.icon || '🪴';
  section.outdoor = ['balcón','terraza','jardín','exterior','patio'].some(w => nextName.toLowerCase().includes(w));
  state.screenSectionDraft = null;
  state.editingSectionId = null;
  setView('spaces');

  try {
    await syncSectionToCloud(section);
  } catch (error) {
    console.error('Failed to sync edited section', error);
    showToast('⚠️ La sección se actualizó localmente, pero no pudimos sincronizarla');
    return;
  }

  showToast(`✏️ Sección "${nextName}" actualizada`);
}

async function saveSectionFromScreen() {
  const draft = state.screenSectionDraft;
  if (!draft) return;

  const nextName = (draft.name || '').trim();
  if (!nextName) {
    showToast('⚠️ El nombre es obligatorio');
    return;
  }

  if (state.editingSectionId) {
    await saveSectionChanges();
    return;
  }

  const section = {
    id: createEntityId('section'),
    name: nextName,
    icon: draft.icon || '🪴',
    outdoor: ['balcón','terraza','jardín','exterior','patio'].some(w => nextName.toLowerCase().includes(w)),
  };

  state.sections.push(section);
  state.screenSectionDraft = null;
  state.editingSectionId = null;
  setView('spaces');

  try {
    await syncSectionToCloud(section);
  } catch (error) {
    console.error('Failed to sync created section from screen', error);
    showToast('⚠️ La sección se creó localmente, pero no pudimos sincronizarla');
    return;
  }

  showToast(`📍 Sección "${nextName}" creada`);
}

async function deleteCurrentSection() {
  const sectionId = state.editingSectionId || state.activeSection;
  const section = state.sections.find(item => item.id === sectionId);
  if (!section) return;
  const affectedPlants = state.plants.filter(plant => plant.section === sectionId);
  affectedPlants.forEach(plant => {
    plant.section = '';
  });
  state.sections = state.sections.filter(item => item.id !== sectionId);
  state.activeSection = 'all';
  state.screenSectionDraft = null;
  state.editingSectionId = null;
  setView('spaces');

  try {
    if (isCloudSyncEnabled()) {
      await deleteSectionFromCloud(sectionId);
    }
  } catch (error) {
    console.error('Failed to delete section in cloud', error);
    showToast('⚠️ La sección se eliminó localmente, pero no pudimos sincronizar el borrado');
    return;
  }

  showToast(`🗑️ Espacio "${section.name}" eliminado${affectedPlants.length ? ` y ${affectedPlants.length} planta${affectedPlants.length === 1 ? '' : 's'} quedaron sin asignar` : ''}`);
}

async function deleteSectionFromScreen() {
  const sectionId = state.editingSectionId || state.activeSection;
  if (!sectionId) return;
  openDeleteSectionModal(sectionId);
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) el.classList.remove('open');
  });
});

// ===== TOAST =====
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== INIT =====
loadState();
initSplash();
render();
initAuth();
</script>
